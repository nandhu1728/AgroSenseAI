html code       <!DOCTYPE html>
<html>
<head>
    <title>AgroSense AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9">

<div class="container mt-5">
<div class="card p-4 shadow">

    <!-- 🌍 Language Dropdown -->
    <form method="get" action="/">
        <select name="lang" onchange="this.form.submit()" class="form-select w-25 mb-3">
            <option value="en" {% if lang=='en' %}selected{% endif %}>English</option>
            <option value="ta" {% if lang=='ta' %}selected{% endif %}>தமிழ்</option>
        </select>
    </form>

    <h4 class="text-center">{{ t.title }}</h4>

    <!-- 🔹 Simulate -->
    <div class="text-center mb-3">
        <a href="/simulate?lang={{ lang }}" class="btn btn-primary">
            {{ t.simulate }}
        </a>
    </div>

    <!-- 🔹 Prediction Form -->
    <form method="post" action="/predict">

        <!-- Important Hidden Language Field -->
        <input type="hidden" name="lang" value="{{ lang }}">

        <input class="form-control mb-2"
               name="moisture"
               placeholder="Moisture"
               value="{{ simulated.moisture if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="N"
               placeholder="Nitrogen"
               value="{{ simulated.N if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="P"
               placeholder="Phosphorus"
               value="{{ simulated.P if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="K"
               placeholder="Potassium"
               value="{{ simulated.K if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="temperature"
               placeholder="Temperature"
               value="{{ simulated.temperature if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="humidity"
               placeholder="Humidity"
               value="{{ simulated.humidity if simulated else '' }}"
               required>

        <input class="form-control mb-2"
               name="light"
               placeholder="Light"
               value="{{ simulated.light if simulated else '' }}"
               required>

        <button class="btn btn-success w-100 mt-2">
            {{ t.analyze }}
        </button>
    </form>

    <!-- 🔹 Result Section -->
    {% if result %}
    <div class="mt-4 text-center">
        <h5>{{ t.recommended }}</h5>
        <p>{{ result }}</p>
        <p>{{ soil }}</p>
        <p><b>{{ t.fertilizer }}:</b> {{ fertilizer }}</p>
    </div>
    {% endif %}

    <!-- 🔹 Recent History -->
    {% if history %}
    <div class="mt-4">
        <h6>{{ t.recent }}</h6>
        <ul class="list-group">
            {% for item in history %}
            <li class="list-group-item">{{ item }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

</div>
</div>

</body>
</html>
